apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-gateway
  namespace: ai-modernization
  labels:
    app.kubernetes.io/name: llm-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: llm-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llm-gateway
    spec:
      serviceAccountName: llm-gateway
      containers:
        - name: gateway
          image: ghcr.io/example/llm-gateway:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: POLICY_MODE
              value: enforce
            - name: VECTOR_INDEX
              value: enterprise-knowledge-dev
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: llm-gateway
  namespace: ai-modernization
---
apiVersion: v1
kind: Service
metadata:
  name: llm-gateway
  namespace: ai-modernization
spec:
  selector:
    app.kubernetes.io/name: llm-gateway
  ports:
    - name: http
      port: 80
      targetPort: http
